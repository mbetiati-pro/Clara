<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Maria Clara</title>
  <style>
    :root {
      --bg: #efe7de; --bar: #f7f4f0; --line: #e2dcd3; --txt: #111b21; --sub: #667781;
      --bolha-clara: #ffffff; --bolha-user: #d9fdd3; --campo: #ffffff; --menu: #ffffff;
    }
    body.escuro {
      --bg: #0b141a; --bar: #202c33; --line: #2a3942; --txt: #e9edef; --sub: #8696a0;
      --bolha-clara: #202c33; --bolha-user: #005c4b; --campo: #2a3942; --menu: #233138;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--txt); height: 100dvh; display: flex; flex-direction: column; }
    header { background: var(--bar); padding: 10px 12px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--line); position: relative; flex-shrink: 0; }
    #foto { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      background: #8a8378; color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; }
    #ident { flex: 1; min-width: 0; }
    #nome-topo { font-size: 16px; font-weight: 600; }
    #cargo { font-size: 12px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #pontos { background: none; border: none; color: var(--sub); font-size: 22px; cursor: pointer; padding: 0 6px; }
    #menu { position: absolute; top: 52px; right: 10px; background: var(--menu); border: 1px solid var(--line);
      border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: none; z-index: 10; overflow: hidden; }
    #menu.aberto { display: block; }
    #menu button { display: block; width: 100%; text-align: left; background: none; border: none;
      color: var(--txt); padding: 12px 20px; font-size: 14px; cursor: pointer; white-space: nowrap; }
    #menu button:hover { background: var(--line); }
    #chat { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 6px; }
    .msg { max-width: 78%; padding: 7px 11px; border-radius: 8px; line-height: 1.45; font-size: 15px;
      white-space: pre-wrap; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.08); }
    .clara { align-self: flex-start; background: var(--bolha-clara); border-top-left-radius: 2px; }
    .user { align-self: flex-end; background: var(--bolha-user); border-top-right-radius: 2px; }
    .typing { align-self: flex-start; color: var(--sub); font-style: italic; font-size: 13px; padding: 4px 11px; }
    #status { display: none; }
    footer { padding: 8px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    #input { flex: 1; padding: 11px 14px; border: none; border-radius: 22px; font-size: 15px;
      background: var(--campo); color: var(--txt); outline: none; resize: none; max-height: 110px;
      font-family: inherit; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    #send { background: #00a884; color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px;
      font-size: 17px; cursor: pointer; flex-shrink: 0; }
    #send:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <header>
    <div id="foto">MC</div>
    <div id="ident">
      <div id="nome-topo">Maria Clara</div>
      <div id="cargo">AI Chief Discovery Officer @ mbetiati.pro</div>
    </div>
    <button id="pontos">&#8942;</button>
    <div id="menu">
      <button data-tema="claro">Visual Claro</button>
      <button data-tema="escuro">Visual Escuro</button>
      <button data-tema="sistema">Visual do Sistema</button>
      <button id="nova">Nova conversa</button>
    </div>
  </header>
  <div id="chat"></div>
  <div id="status"></div>
  <footer>
    <textarea id="input" rows="1" placeholder="Mensagem"></textarea>
    <button id="send">&#10148;</button>
  </footer>
  <script>
    var chat = document.getElementById("chat");
    var input = document.getElementById("input");
    var send = document.getElementById("send");
    var status = document.getElementById("status");
    var pontos = document.getElementById("pontos");
    var menu = document.getElementById("menu");
    var CHAVE = "clara_conversa";
    var messages = [];
    var conversaId = "";

    function novoId() {
      try { return crypto.randomUUID(); }
      catch (e) { return "c" + Date.now() + Math.random().toString(16).slice(2); }
    }
    function salvarLocal() {
      try { localStorage.setItem(CHAVE, JSON.stringify({ id: conversaId, messages: messages })); } catch (e) {}
    }
    function carregarLocal() {
      try { return JSON.parse(localStorage.getItem(CHAVE)); } catch (e) { return null; }
    }
    function aplicarTema(t) {
      if (t === "sistema") {
        document.body.classList.toggle("escuro", window.matchMedia("(prefers-color-scheme: dark)").matches);
      } else {
        document.body.classList.toggle("escuro", t === "escuro");
      }
      try { localStorage.setItem("tema", t); } catch (e) {}
    }
    aplicarTema(localStorage.getItem("tema") || "sistema");

    pontos.addEventListener("click", function (e) { e.stopPropagation(); menu.classList.toggle("aberto"); });
    document.addEventListener("click", function () { menu.classList.remove("aberto"); });
    var temaBtns = menu.querySelectorAll("button[data-tema]");
    for (var i = 0; i < temaBtns.length; i++) {
      (function (b) {
        b.addEventListener("click", function () { aplicarTema(b.dataset.tema); menu.classList.remove("aberto"); });
      })(temaBtns[i]);
    }
    document.getElementById("nova").addEventListener("click", function () {
      if (!confirm("Comecar uma conversa nova? A atual sera apagada deste aparelho.")) return;
      try { localStorage.removeItem(CHAVE); } catch (e) {}
      location.reload();
    });

    function addBubble(text, who) {
      var partes = String(text).split(/\n\s*\n/).map(function (p) { return p.trim(); }).filter(Boolean);
      var blocos = partes.length ? partes : [String(text)];
      var ultimo = null;
      blocos.forEach(function (parte) {
        var div = document.createElement("div");
        div.className = "msg " + who;
        div.textContent = parte;
        chat.appendChild(div);
        ultimo = div;
      });
      chat.scrollTop = chat.scrollHeight;
      return ultimo;
    }
    function esperar(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

    async function abrirConversa() {
      var baloes = [
        "Ola! Tudo bom?",
        "Eu me chamo Maria Clara, sou socia de IA do Marcos Betiati.",
        "Atualmente tambem sou AI Chief Discovery Officer da mbetiati.pro",
        "Antes da gente comecar... como voce se chama?"
      ];
      for (var i = 0; i < baloes.length; i++) {
        var t = addBubble("digitando...", "typing");
        await esperar(700);
        t.remove();
        addBubble(baloes[i], "clara");
        messages.push({ role: "assistant", content: baloes[i] });
        await esperar(250);
      }
      salvarLocal();
      input.focus();
    }

    async function salvarDossie() {
      if (messages.length < 6) return;
      try {
        var res = await fetch("/api/dossie", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: messages, id: conversaId })
        });
        var data = await res.json();
        status.textContent = data.ok ? "salvo" : "erro ao salvar";
      } catch (err) {
        status.textContent = "erro ao salvar";
      }
    }

    async function sendMessage() {
      var text = input.value.trim();
      if (!text) return;
      input.value = "";
      input.style.height = "auto";
      addBubble(text, "user");
      messages.push({ role: "user", content: text });
      salvarLocal();
      send.disabled = true;
      var typing = addBubble("digitando...", "typing");
      try {
        var res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: messages })
        });
        var data = await res.json();
        typing.remove();
        if (data.reply) {
          addBubble(data.reply, "clara");
          messages.push({ role: "assistant", content: data.reply });
          salvarLocal();
          salvarDossie();
        } else {
          addBubble("[erro] " + (data.error || "sem resposta"), "clara");
        }
      } catch (err) {
        typing.remove();
        addBubble("[erro de conexao] " + err, "clara");
      }
      send.disabled = false;
      input.focus();
    }

    send.addEventListener("click", sendMessage);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    input.addEventListener("input", function () {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 110) + "px";
    });

    function ajustarAltura() {
      var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.body.style.height = h + "px";
      chat.scrollTop = chat.scrollHeight;
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", ajustarAltura);
      window.visualViewport.addEventListener("scroll", ajustarAltura);
    }
    window.addEventListener("resize", ajustarAltura);
    input.addEventListener("focus", function () { setTimeout(ajustarAltura, 300); });
    ajustarAltura();

    var salvo = carregarLocal();
    if (salvo && salvo.messages && salvo.messages.length) {
      conversaId = salvo.id || novoId();
      messages = salvo.messages;
      for (var j = 0; j < messages.length; j++) {
        addBubble(messages[j].content, messages[j].role === "assistant" ? "clara" : "user");
      }
      chat.scrollTop = chat.scrollHeight;
    } else {
      conversaId = novoId();
      abrirConversa();
    }
  </script>
</body>
</html>
