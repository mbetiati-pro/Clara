<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Clara</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f3ef; color: #1a1a1a; height: 100dvh; display: flex; flex-direction: column; }
    header { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e6e2da; text-align: center; }
    header .htitle { font-weight: 600; }
    header .hsub { font-weight: 400; color: #8a8378; font-size: 12px; margin-top: 2px; }
    #status { font-size: 11px; color: #b3aca0; margin-top: 4px; height: 14px; }
    #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
    .user { align-self: flex-end; background: #1a1a1a; color: #fff; border-bottom-right-radius: 4px; }
    .clara { align-self: flex-start; background: #fff; border: 1px solid #e6e2da; border-bottom-left-radius: 4px; }
    .typing { align-self: flex-start; color: #8a8378; font-style: italic; }
    footer { padding: 12px; background: #fff; border-top: 1px solid #e6e2da; display: flex; gap: 8px; }
    #input { flex: 1; padding: 12px 14px; border: 1px solid #d8d3c8; border-radius: 22px; font-size: 16px; outline: none; resize: none; max-height: 120px; }
    #send { background: #1a1a1a; color: #fff; border: none; border-radius: 22px; padding: 0 18px; font-size: 15px; cursor: pointer; }
    #send:disabled { opacity: 0.4; }
  </style>
</head>
<body>
  <header>
    <div class="htitle">Clara</div>
    <div class="hsub">sócia de IA do Marcos</div>
    <div id="status"></div>
  </header>
  <div id="chat"></div>
  <footer>
    <textarea id="input" rows="1" placeholder="Escreva aqui..."></textarea>
    <button id="send">Enviar</button>
  </footer>
  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const status = document.getElementById("status");
    const messages = [];

    const conversaId = (function () {
      try { return crypto.randomUUID(); }
      catch (e) { return "c" + Date.now() + Math.random().toString(16).slice(2); }
    })();

    function addBubble(text, who) {
      const div = document.createElement("div");
      div.className = "msg " + who;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function salvarDossie() {
      if (messages.length < 2) return;
      try {
        const res = await fetch("/api/dossie", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages, id: conversaId })
        });
        const data = await res.json();
        status.textContent = data.ok ? "salvo" : "erro ao salvar";
      } catch (err) {
        status.textContent = "erro ao salvar";
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addBubble(text, "user");
      messages.push({ role: "user", content: text });
      send.disabled = true;
      const typing = addBubble("Clara está digitando...", "typing");
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        typing.remove();
        if (data.reply) {
          addBubble(data.reply, "clara");
          messages.push({ role: "assistant", content: data.reply });
          salvarDossie();
        } else {
          addBubble("[erro] " + (data.error || "sem resposta"), "clara");
        }
      } catch (err) {
        typing.remove();
        addBubble("[erro de conexão] " + err, "clara");
      }
      send.disabled = false;
      input.focus();
    }

    send.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    const abertura = "Olá! Eu sou a Clara, sócia de IA do Marcos. Queria trocar uma ideia contigo - me conta, o que você faz?";
    addBubble(abertura, "clara");
    messages.push({ role: "assistant", content: abertura });
  </script>
</body>
</html>
